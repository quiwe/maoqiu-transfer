name: maoqiu_transfer
description: Local WiFi file transfer client using UDP discovery and TCP file streaming.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  convert: ^3.1.2
  crypto: ^3.0.6
  file_picker: ^8.1.7
  mobile_scanner: ^7.0.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.5
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
