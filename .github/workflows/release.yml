name: Release Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android platform files
        run: flutter create . --platforms=android

      - name: Patch Android APK platform
        run: ./tool/patch_android_platform.sh

      - name: Install Android API 36
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Android plugin compile SDK
        run: ./tool/patch_android_pub_cache.sh

      - name: Analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Stage APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/maoqiu-transfer-v${VERSION}-android.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: dist/maoqiu-transfer-v*-android.apk

  windows:
    name: Windows Installer EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Generate Windows platform files
        run: flutter create . --platforms=windows

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $releaseDir = "build\windows\x64\runner\Release"
          $exe = Get-ChildItem $releaseDir -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Windows executable not found in $releaseDir" }
          $iss = @"
          [Setup]
          AppId={{B9F62029-1D88-4B0C-99C7-0B9B7206C00C}
          AppName=毛球互传
          AppVersion=$($env:VERSION)
          AppPublisher=MaoQiu
          DefaultDirName={autopf}\MaoQiuTransfer
          DefaultGroupName=毛球互传
          OutputDir=dist
          OutputBaseFilename=maoqiu-transfer-v$($env:VERSION)-windows-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesInstallIn64BitMode=x64

          [Files]
          Source: "$releaseDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\毛球互传"; Filename: "{app}\$($exe.Name)"
          Name: "{commondesktop}\毛球互传"; Filename: "{app}\$($exe.Name)"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "附加图标："; Flags: unchecked

          [Run]
          Filename: "{app}\$($exe.Name)"; Description: "启动毛球互传"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $iss -Encoding UTF8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/maoqiu-transfer-v*-windows-setup.exe

  macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Generate macOS platform files
        run: flutter create . --platforms=macos

      - name: Patch macOS platform
        run: ./tool/patch_macos_platform.sh

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build macOS release
        run: flutter build macos --release

      - name: Build DMG
        run: |
          mkdir -p dist
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "macOS app bundle not found" >&2
            exit 1
          fi
          hdiutil create \
            -volname "MaoQiu Transfer" \
            -srcfolder "$app_path" \
            -ov \
            -format UDZO \
            "dist/maoqiu-transfer-v${VERSION}-macos.dmg"

      - name: Build PKG installer
        run: |
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "macOS app bundle not found" >&2
            exit 1
          fi
          pkgbuild \
            --install-location /Applications \
            --component "$app_path" \
            "dist/maoqiu-transfer-v${VERSION}-macos.pkg"

      - name: Upload macOS package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/maoqiu-transfer-v*-macos.dmg
            dist/maoqiu-transfer-v*-macos.pkg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
      - windows
      - macos
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MaoQiu Transfer ${{ github.ref_name }}
          body: |
            - 修复 Android 扫码相机启动异常。
            - 修复 Android 扫码后手机端临时热点未自动开启的问题。
            - 修复 macOS 启动和更新下载目录的沙盒权限问题。
            - macOS Release 新增 `.pkg` 安装包，并保留 `.dmg`。
            - 软件更新优先选择 macOS `.pkg`，并在下载目录不可写时自动回退。
          files: release-assets/*
